<!DOCTYPE html>
<html>
<head>
    <title>Rotating Donut</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e; /* Dark background for contrast */
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2), 0 0 40px rgba(100, 180, 255, 0.5);
            background-color: #0f0f1d;
        }
    </style>
</head>
<body>
    <canvas id="donutCanvas"></canvas>

    <script>
        const canvas = document.getElementById('donutCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas dimensions
        const CANVAS_SIZE = 600;
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        // Animation variables
        let rotationAngle = 0;
        const rotationSpeed = 1.5; // Speed of rotation

        function drawDonut(angle) {
            // Center coordinates
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const outerRadius = 150;
            const innerRadius = 80;

            // Apply rotation transformation
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);

            // --- Draw the Donut Ring ---

            // 1. Outer circle (Donut shape)
            ctx.beginPath();
            ctx.arc(0, 0, outerRadius, 0, Math.PI * 2);
            
            // Use a radial gradient for shading and visual appeal
            const gradient = ctx.createRadialGradient(
                -outerRadius / 4, -outerRadius / 4, innerRadius, // Light source (center)
                0, 0, outerRadius // Outer edge
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Bright white center
            gradient.addColorStop(0.7, 'rgba(255, 165, 0, 0.8)'); // Orange highlight
            gradient.addColorStop(1, 'rgba(139, 0, 0, 0.5)'); // Reddish shadow

            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 2. Inner circle (The hole)
            ctx.beginPath();
            ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 1)'; // Black or dark fill for the hole
            ctx.fill();

            // --- Add Details (Optional: Highlight) ---
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 5;
            ctx.stroke();


            // Restore context to reset transformations
            ctx.restore();
        }

        function animate() {
            // Clear the canvas
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Update rotation angle
            rotationAngle += rotationSpeed;

            // Draw the donut at the new angle
            drawDonut(rotationAngle);

            // Loop the animation
            requestAnimationFrame(animate);
        }

        // Start the animation
        animate();
    </script>
</body>
</html>
