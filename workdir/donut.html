<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Donut That Follows Cursor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="donutCanvas"></canvas>

    <script>
        const canvas = document.getElementById('donutCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas to full window size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Donut parameters
        const R = 100; // Major radius
        const r = 40;  // Minor radius
        
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        
        // Track mouse movement
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Rotation angles
        let theta = 0;
        let phi = 0;

        // Projection parameters
        const K1 = 200; // Distance from viewer to screen
        const K2 = 5;   // Distance from center to donut

        function renderDonut() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate angles based on mouse position
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const deltaX = mouseX - centerX;
            const deltaY = mouseY - centerY;
            
            theta = Math.atan2(deltaY, deltaX);
            phi = Math.atan2(Math.sqrt(deltaX * deltaX + deltaY * deltaY), (centerY - mouseY));

            // Rotation matrices
            const cosTheta = Math.cos(theta);
            const sinTheta = Math.sin(theta);
            const cosPhi = Math.cos(phi);
            const sinPhi = Math.sin(phi);

            // Precompute constants
            const cosR = Math.cos(R);
            const sinR = Math.sin(R);
            const cosr = Math.cos(r);
            const sinr = Math.sin(r);

            // Create a character map for rendering
            const chars = ".,-~:;=!*#$@";
            
            // Create an array to store z-buffer values
            const zBuffer = new Array(canvas.width * canvas.height).fill(0);
            
            // Create an array to store character buffer
            const charBuffer = new Array(canvas.width * canvas.height).fill(' ');

            // Render the donut
            for (let i = 0; i < 100; i++) {
                for (let j = 0; j < 100; j++) {
                    const u = (i / 100) * Math.PI * 2;
                    const v = (j / 100) * Math.PI * 2;

                    // Donut coordinates
                    const x = (R + r * Math.cos(v)) * Math.cos(u);
                    const y = r * Math.sin(v);
                    const z = (R + r * Math.cos(v)) * Math.sin(u);

                    // Rotate around Y axis
                    const x1 = x * cosTheta - z * sinTheta;
                    const z1 = x * sinTheta + z * cosTheta;

                    // Rotate around X axis
                    const y1 = y * cosPhi - z1 * sinPhi;
                    const z2 = y * sinPhi + z1 * cosPhi;

                    // Perspective projection
                    const ooz = 1 / (z2 + K2);
                    
                    // Screen coordinates
                    const xp = Math.floor(canvas.width / 2 + K1 * ooz * x1);
                    const yp = Math.floor(canvas.height / 2 - K1 * ooz * y1);

                    if (xp >= 0 && xp < canvas.width && yp >= 0 && yp < canvas.height) {
                        // Calculate luminance
                        const L = Math.cos(v) * Math.sin(u) * Math.cos(phi) - Math.sin(v) * Math.sin(phi);
                        
                        // Get character based on luminance
                        const luminanceIndex = Math.floor(L * 10);
                        const char = chars[luminanceIndex] || ' ';
                        
                        const index = yp * canvas.width + xp;
                        
                        if (index < zBuffer.length && ooz > zBuffer[index]) {
                            zBuffer[index] = ooz;
                            charBuffer[index] = char;
                        }
                    }
                }
            }

            // Draw the donut
            for (let i = 0; i < canvas.width * canvas.height; i++) {
                if (charBuffer[i] !== ' ') {
                    const x = i % canvas.width;
                    const y = Math.floor(i / canvas.width);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px monospace';
                    ctx.fillText(charBuffer[i], x, y);
                }
            }

            requestAnimationFrame(renderDonut);
        }

        renderDonut();
    </script>
</body>
</html>
